apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cnpg-dashboard.fullname" . }}
  labels:
    {{- include "cnpg-dashboard.labels" . | nindent 4 }}
rules:
  # Watch Cluster and BarmanObjectStore CRDs for the dashboard UI
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["barmanobjectstores"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["scheduledbackups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["barmancloud.cnpg.io"]
    resources: ["objectstores"]
    verbs: ["get", "list", "watch"]
  # Create Backup resources (trigger backup action)
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["backups"]
    verbs: ["get", "list", "watch", "create"]
  # Patch Cluster for switchover action
  - apiGroups: ["postgresql.cnpg.io"]
    resources: ["clusters"]
    verbs: ["patch"]
  # Pod metrics (CPU/memory) for instance display
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list"]
