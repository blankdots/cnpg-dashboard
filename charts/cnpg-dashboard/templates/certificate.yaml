{{- if and .Values.tls.enabled (not .Values.tls.skipCertResources) }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Values.tls.secretName }}
  namespace: {{ .Release.Namespace }}
spec:
  secretName: {{ .Values.tls.secretName }}
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - localhost
    - {{ include "cnpg-dashboard.fullname" . }}
    - {{ include "cnpg-dashboard.fullname" . }}.{{ .Release.Namespace }}
    - {{ include "cnpg-dashboard.fullname" . }}.{{ .Release.Namespace }}.svc.cluster.local
{{- end }}
