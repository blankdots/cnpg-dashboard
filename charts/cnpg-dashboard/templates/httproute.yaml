{{- if and .Values.gatewayApi.enabled .Values.gatewayApi.gateway.name }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "cnpg-dashboard.fullname" . }}
  labels:
    {{- include "cnpg-dashboard.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gatewayApi.gateway.name }}
      {{- if .Values.gatewayApi.gateway.namespace }}
      namespace: {{ .Values.gatewayApi.gateway.namespace }}
      {{- end }}
      {{- if .Values.gatewayApi.tls.listenerName }}
      sectionName: {{ .Values.gatewayApi.tls.listenerName }}
      {{- end }}
  {{- with .Values.gatewayApi.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - backendRefs:
        - name: {{ include "cnpg-dashboard.fullname" . }}
          port: {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}
{{- end }}
