apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cnpg-dashboard.fullname" . }}
  labels:
    {{- include "cnpg-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "cnpg-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cnpg-dashboard.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cnpg-dashboard.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["dashboard"]
          env:
            - name: LISTEN_ADDR
              value: {{ if .Values.tls.enabled }}":{{ .Values.tls.port }}"{{ else }}":8080"{{ end }}
            {{- if .Values.tls.enabled }}
            - name: TLS_CERT_FILE
              value: "/etc/tls/tls.crt"
            - name: TLS_KEY_FILE
              value: "/etc/tls/tls.key"
            - name: HEALTH_LISTEN_ADDR
              value: ":8080"
            {{- end }}
          {{- if .Values.log.level }}
            - name: LOG_LEVEL
              value: {{ .Values.log.level | quote }}
          {{- end }}
          {{- if eq .Values.log.format "json" }}
            - name: LOG_FORMAT
              value: "json"
          {{- end }}
          ports:
            - name: {{ if .Values.tls.enabled }}https{{ else }}http{{ end }}
              containerPort: {{ if .Values.tls.enabled }}{{ .Values.tls.port }}{{ else }}{{ .Values.service.port }}{{ end }}
              protocol: TCP
            {{- if .Values.tls.enabled }}
            - name: health
              containerPort: 8080
              protocol: TCP
            {{- end }}
          {{- if .Values.tls.enabled }}
          volumeMounts:
            - name: tls
              mountPath: /etc/tls
              readOnly: true
          {{- end }}
          livenessProbe:
            {{- if .Values.tls.enabled }}
            httpGet:
              path: /health
              port: health
            {{- else }}
            {{- toYaml .Values.livenessProbe | nindent 12 }}
            {{- end }}
          readinessProbe:
            {{- if .Values.tls.enabled }}
            httpGet:
              path: /health
              port: health
            {{- else }}
            {{- toYaml .Values.readinessProbe | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        {{- if .Values.tls.enabled }}
        - name: tls
          secret:
            secretName: {{ .Values.tls.secretName }}
        {{- end }}
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
