apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cnpg-dashboard.fullname" . }}
  labels:
    {{- include "cnpg-dashboard.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cnpg-dashboard.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "cnpg-dashboard.serviceAccountName" . }}
    namespace: {{ .Values.serviceAccount.namespace | default .Release.Namespace | default "default" }}
