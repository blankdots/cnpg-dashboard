# Default RustFS credentials (Helm default: rustfsadmin/rustfsadmin).
# Used by BarmanObjectStore to talk to RustFS S3 API in-cluster.
apiVersion: v1
kind: Secret
metadata:
  name: rustfs-credentials
  namespace: default
type: Opaque
stringData:
  ACCESS_KEY_ID: rustfsadmin
  SECRET_ACCESS_KEY: rustfsadmin
